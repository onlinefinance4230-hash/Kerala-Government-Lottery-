let currentLang = "en";
let lastGeneratedTickets = 1;
let lastGeneratedAmount = 149;

// STATE ENGINE GENERATES REGIONAL FULL NAMES
function runLiveActivity(){
    const targetRow = indiaStateDatabase[Math.floor(Math.random() * indiaStateDatabase.length)];
    const randomState = targetRow.state;
    const randomFullName = targetRow.names[Math.floor(Math.random() * targetRow.names.length)];
    
    lastGeneratedTickets = Math.floor(Math.random() * 4) + 1;
    lastGeneratedAmount = lastGeneratedTickets * 149;

    document.getElementById("live-user-name").innerText = randomFullName;
    document.getElementById("live-user-state").innerText = randomState;
    renderLiveBoxText();
}
runLiveActivity();
setInterval(runLiveActivity, 5000);

function renderLiveBoxText() {
    const lang = fullPageTranslations[currentLang] || fullPageTranslations.en;
    document.getElementById("live-from-text").innerText = lang.liveFrom;
    document.getElementById("live-user-tickets").innerText = lang.liveBookedText.replace("{num}", lastGeneratedTickets);
    document.getElementById("live-user-paid").innerText = lang.livePaidText.replace("{amt}", lastGeneratedAmount);
}

// LIVE TICKER ENGINE
setInterval(()=>{
    const randomNumber = Math.floor(100000 + Math.random()*900000);
    document.getElementById("live-ticket-ticker").innerText = `KL-${randomNumber}`;
}, 4000);

// MULTI-LANGUAGE TRANSLATOR TRIGGER
document.getElementById("langSelect").addEventListener("change", function(){
    currentLang = this.value;
    const lang = fullPageTranslations[currentLang] || fullPageTranslations.en;

    document.getElementById("sub-banner-text").innerText = lang.banner;
    document.getElementById("result-label").innerText = lang.resultLabel;
    document.getElementById("language-label").innerText = lang.chooseLang;
    document.getElementById("name-label").innerText = lang.enterName;
    document.getElementById("custName").placeholder = lang.namePlaceholder;
    document.getElementById("whatsapp-label").innerText = lang.enterWhatapp;
    document.getElementById("custWhatsapp").placeholder = lang.whatsappPlaceholder;
    document.getElementById("ticket-label").innerText = lang.chooseTicket;
    document.getElementById("selected-text").innerText = lang.selectedText;
    document.getElementById("ticket-unit").innerText = lang.ticketUnit;
    document.getElementById("amount-text").innerText = lang.amountText;
    document.getElementById("submit-btn").innerText = lang.submitBtn;

    renderLiveBoxText();
});

// TICKETS GRID LOADER
const ticketsGrid = document.getElementById("tickets-grid");
let selectedTickets = [];
const ticketPrice = 149; 

for(let i=1; i<=200; i++){
    const randomDigits = Math.floor(100000 + Math.random()*900000);
    const ticketID = `KL${randomDigits}`;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "border border-slate-300 text-slate-700 font-bold p-2 rounded-xl text-xs flex items-center justify-center gap-1 bg-white hover:bg-slate-100 transition cursor-pointer shadow-sm";
    btn.innerHTML = `🎫 <span>${ticketID}</span>`;

    btn.onclick = function(){
        const index = selectedTickets.indexOf(ticketID);
        if(index > -1){
            selectedTickets.splice(index,1);
            this.className = "border border-slate-300 text-slate-700 font-bold p-2 rounded-xl text-xs flex items-center justify-center gap-1 bg-white hover:bg-slate-100 transition cursor-pointer shadow-sm";
        }else{
            selectedTickets.push(ticketID);
            this.className = "bg-slate-800 text-amber-400 border border-slate-800 font-black p-2 rounded-xl text-xs flex items-center justify-center gap-1 cursor-pointer shadow-md";
        }
        document.getElementById("ticketCount").innerText = selectedTickets.length;
        document.getElementById("totalAmount").innerText = `₹${selectedTickets.length * ticketPrice}`;
    };
    ticketsGrid.appendChild(btn);
}

// DISPATCH LINK GENERATOR
function sendToWhatsApp(){
    const nameInput = document.getElementById("custName").value.trim();
    const whatsappInput = document.getElementById("custWhatsapp").value.trim();
    const lang = fullPageTranslations[currentLang] || fullPageTranslations.en;

    if(nameInput === ""){ alert(lang.alertName); return; }
    if(whatsappInput === ""){ alert(lang.alertPhone); return; }
    if(selectedTickets.length === 0){ alert(lang.alertTicket); return; }

    const totalBill = selectedTickets.length * ticketPrice;
    
    const textMessage = 
`*NEW MEGA JACKPOT BOOKING*

👤 *Name:* ${nameInput}
📞 *WhatsApp:* ${whatsappInput}

🎟️ *Selected Tickets (${selectedTickets.length}):*
${selectedTickets.join(", ")}

💰 *Amount:* ₹${totalBill}

*Status:* Pending Payment Confirmation`;

    const encryptedText = encodeURIComponent(textMessage);
    const whatsappUrl = `https://api.whatsapp.com/send?phone=91${MY_WHATSAPP_NUMBER}&text=${encryptedText}`;

    window.open(whatsappUrl, '_blank');
}
